name: 雲端重算族群布林

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1-5'  # 台灣17:00自動跑

permissions:
  contents: write

jobs:
  recompute:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 執行雲端重算
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: node recompute.mjs
