<html lang="zh-TW">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0f14">
    <title>籌碼先行 — 動能量化分析儀</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* ══ CSS 變數 ══ */
        :root {
            --bg:         #0d0f14;
            --bg2:        #161b25;
            --bg3:        #1e2535;
            --bg4:        #111827;
            --border:     #2a3350;
            --text:       #cdd6f4;
            --text-dim:   #7a8ab0;
            --accent:     #3b82f6;
            --accent2:    #60a5fa;
            --th-bg:      #1a2540;
            --row-even:   #131825;
            --row-hover:  #1e2d4a;
            --input-bg:   #0d1220;
            --red:        #f87171;
            --green:      #4ade80;
            --gold:       #fbbf24;
            --orange:     #fb923c;
        }

        /* ══ Reset & Base ══ */
        *, *::before, *::after { box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 12px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* ══ Container ══ */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: var(--bg2);
            padding: 20px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.7);
            border: 1px solid var(--border);
        }

        /* ══ 標題 ══ */
        h1 {
            color: var(--accent2);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            font-size: clamp(16px, 4vw, 24px);
            margin: 0 0 16px;
            line-height: 1.3;
        }

        /* ══ 上傳控制區 ══ */
        .control-panel {
            background: var(--bg3);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border-left: 4px solid var(--accent);
        }
        .control-panel p { margin: 0 0 10px; font-size: 13px; color: var(--text-dim); }
        .upload-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input[type="file"] {
            font-size: 14px;
            padding: 8px 10px;
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            flex: 1;
            min-width: 0;
            max-width: 100%;
        }

        /* ══ 按鈕 ══ */
        button {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: #fff;
            border: none;
            padding: 11px 22px;
            font-size: 15px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        button:hover  { background: linear-gradient(135deg, #1d4ed8, #2563eb); }
        button:active { opacity: .85; }
        .btn-download {
            background: #16a34a;
            padding: 6px 14px;
            font-size: 12px;
            margin-left: 8px;
            border-radius: 5px;
            font-weight: 600;
        }
        .btn-download:hover { background: #15803d; }
        .btn-reset         { background: #d97706; padding: 8px 16px; font-size: 13px; border-radius: 5px; margin-right: 6px; }
        .btn-reset:hover   { background: #b45309; }
        .btn-export-cfg    { background: #7c3aed; padding: 8px 16px; font-size: 13px; border-radius: 5px; }
        .btn-export-cfg:hover { background: #6d28d9; }
        .btn-hist-export   { background: #16a34a; color: #fff; border: none; padding: 8px 16px; font-size: 13px; border-radius: 5px; cursor: pointer; font-weight: 700; }
        .btn-hist-export:hover { background: #15803d; }
        .btn-hist-clear    { background: #dc2626; color: #fff; border: none; padding: 8px 16px; font-size: 13px; border-radius: 5px; cursor: pointer; font-weight: 700; }
        .btn-hist-clear:hover  { background: #b91c1c; }
        .btn-del-hist { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 3px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; }
